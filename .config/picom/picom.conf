# Backend
backend = "glx";
use-damage = true;

# Тени
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.6;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-color = "#1d2021";  # gruvbox dark bg
shadow-exclude = [
    "class_g = 'qtile_bar'",
    "_GTK_FRAME_EXTENTS",
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "QTILE_INTERNAL = 1",
];

# Скруглённые углы
corner-radius = 10;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "QTILE_INTERNAL = 1",
];

# Blur
blur-method = "dual_kawase";
blur-strength = 5;
blur-background = true;
blur-background-exclude = [
    "window_type = 'desktop'",
    "QTILE_INTERNAL = 1",
    "name ~= 'maim'",
    "name ~= 'slop'"
];

# Прозрачность неактивных окон
inactive-opacity = 0.9;
active-opacity = 1.0;
focus-exclude = [
    "class_g = 'Cairo-clock'",
    "class_g = 'firefox'",
    "QTILE_INTERNAL = 1",
];

# Анимации fade
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# Общее
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;

# Анимации смены рабочих столов и перемещений окон
animations = (
  {
    triggers = ["open", "show"];
    preset = "fly-in";
    direction = "down";
    duration = 0.2;
  },
  {
    triggers = ["close", "hide"];
    preset = "fly-out";
    direction = "down";
    duration = 0.2;
  },
  {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.2;
  }
);
